name: อัปเดตฐานข้อมูลหนังสือเรียนรายสัปดาห์

on:
  schedule:
    # รันอัตโนมัติทุกเช้าวันจันทร์ เวลา 00:00 (UTC) หรือ 07:00 (เวลาไทย)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # อนุญาตให้กดรัน Manual ได้จากหน้า Actions
  push:
    branches:
      - main
    paths:
      - 'scripts/scraper.py'

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # จำเป็นสำหรับการทำ Commit & Push อัตโนมัติ
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Web Scraper
        run: python scripts/scraper.py

      - name: Check for Changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json updated.json
          git commit -m "chore: อัปเดตฐานข้อมูลหนังสือเรียนอัตโนมัติ"
          git push
